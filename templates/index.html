<!DOCTYPE html>
<html>
<head>
    <title>Text to Voice - ElevenLabs</title>
</head>
<body>
    <h1>Convert Text to Speech</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <textarea name="text" rows="4" cols="50" placeholder="Enter your text here..."></textarea><br><br>
        <button type="submit">Convert to Voice</button>
    </form>

    <p>After you submit, your browser will either download or directly play the audio file.</p>
</body>
</html>
