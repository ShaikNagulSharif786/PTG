<!DOCTYPE html>
<html>
<head>
    <title>Gemini AI Flask App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        textarea { width: 100%; height: 120px; font-size: 16px; }
        button { padding: 10px 20px; margin-top: 10px; font-size: 16px; }
        .response { margin-top: 20px; background: #f4f4f4; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Ask Gemini 2.5-Pro</h1>
    <form method="POST">
        <textarea name="prompt" placeholder="Type your prompt here..."></textarea><br>
        <button type="submit">Send</button>
    </form>

    {% if response %}
    <div class="response">
        <h3>AI Response:</h3>
        <p>{{ response }}</p>
    </div>
    {% endif %}
</body>
</html>
